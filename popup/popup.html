<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HogTTV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Google Sans', 'Segoe UI', sans-serif;
      width: 260px;
      margin: 0;
      padding: 16px;
      color: #202124;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header .icon { font-size: 22px; }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      color: #1a73e8;
    }

    .stat {
      font-size: 13px;
      color: #5f6368;
      margin-bottom: 14px;
      min-height: 18px;
    }

    .stat strong { color: #202124; }

    .divider {
      border: none;
      border-top: 1px solid #e8eaed;
      margin: 12px 0;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-align: left;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }
    .btn-primary:hover { background: #1557b0; }

    .btn-secondary {
      background: #f1f3f4;
      color: #3c4043;
    }
    .btn-secondary:hover { background: #e8eaed; }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: #dadce0;
      vertical-align: middle;
    }
    .status-dot.ok { background: #188038; }
    .status-dot.err { background: #d93025; }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">🐷</span>
    <h1>HogTTV</h1>
  </div>

  <div class="stat" id="stat">
    <span class="status-dot" id="dot"></span>
    <span id="stat-text">Checking…</span>
  </div>

  <hr class="divider" />

  <div class="actions">
    <button class="btn-secondary" id="refresh-btn">Refresh emojis</button>
    <button class="btn-primary" id="options-btn">Open settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
