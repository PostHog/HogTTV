<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slack Emojis for Meet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1d21;
      color: #d1d2d3;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .subtitle {
      color: #9aa0ac;
      font-size: 12px;
      margin-bottom: 16px;
    }

    /* ── Disconnected view ─────────────────────────────────────── */

    #disconnectedView {
      display: none;
    }

    #connectBtn {
      width: 100%;
      padding: 10px 12px;
      background: #4a154b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
    }

    #connectBtn:hover:not(:disabled) { opacity: 0.85; }
    #connectBtn:disabled { opacity: 0.5; cursor: default; }

    .slack-hash {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* ── Connected view ────────────────────────────────────────── */

    #connectedView {
      display: none;
    }

    .workspace-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .workspace-label {
      font-size: 12px;
      color: #9aa0ac;
    }

    #workspaceName {
      font-weight: 600;
      color: #fff;
      font-size: 13px;
    }

    .connected-badge {
      font-size: 11px;
      color: #52b788;
      background: #1e3a2f;
      border: 1px solid #2d6a4f;
      padding: 2px 7px;
      border-radius: 10px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled { opacity: 0.5; cursor: default; }

    #syncBtn {
      background: #4a90e2;
      color: #fff;
    }

    #syncBtn:hover:not(:disabled) { opacity: 0.85; }

    #disconnectBtn {
      background: transparent;
      color: #9aa0ac;
      border: 1px solid #3d3f44;
      flex: 0 0 auto;
      padding: 7px 10px;
    }

    #disconnectBtn:hover:not(:disabled) {
      background: #3b1a1a;
      border-color: #6b2c2c;
      color: #e07070;
    }

    /* ── Shared ────────────────────────────────────────────────── */

    #status {
      min-height: 36px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }

    #status.success {
      display: block;
      background: #1e3a2f;
      border: 1px solid #2d6a4f;
      color: #52b788;
    }

    #status.error {
      display: block;
      background: #3b1a1a;
      border: 1px solid #6b2c2c;
      color: #e07070;
    }

    #status.info {
      display: block;
      background: #1e2a3a;
      border: 1px solid #2d4a6a;
      color: #7ab3e0;
    }

    .cache-info {
      font-size: 11px;
      color: #6e7580;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🏷 Slack Emojis for Meet</h1>
  <p class="subtitle">Bring your workspace emojis into Google Meet chat.</p>

  <!-- Disconnected -->
  <div id="disconnectedView">
    <button id="connectBtn">
      <span class="slack-hash">#</span> Connect to Slack
    </button>
  </div>

  <!-- Connected -->
  <div id="connectedView">
    <div class="workspace-row">
      <div>
        <div class="workspace-label">Connected workspace</div>
        <div id="workspaceName"></div>
      </div>
      <span class="connected-badge">connected</span>
    </div>
    <div class="actions">
      <button id="syncBtn">Sync emojis</button>
      <button id="disconnectBtn">Disconnect</button>
    </div>
  </div>

  <div id="status"></div>
  <p class="cache-info" id="cacheInfo"></p>

  <script src="popup.js"></script>
</body>
</html>
