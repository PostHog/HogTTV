<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slack Emojis for Meet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1d21;
      color: #d1d2d3;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .subtitle {
      color: #9aa0ac;
      font-size: 12px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 500;
      color: #c9cacb;
      margin-bottom: 5px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      background: #222529;
      border: 1px solid #4a4f5b;
      border-radius: 6px;
      color: #d1d2d3;
      font-size: 13px;
      outline: none;
      margin-bottom: 6px;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: #4a90e2;
    }

    .help {
      font-size: 11px;
      color: #9aa0ac;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .help a {
      color: #4a90e2;
      text-decoration: none;
    }

    .help a:hover { text-decoration: underline; }

    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled { opacity: 0.5; cursor: default; }

    #syncBtn {
      background: #4a90e2;
      color: #fff;
    }

    #syncBtn:hover:not(:disabled) { opacity: 0.85; }

    #clearBtn {
      background: #3d3f44;
      color: #c9cacb;
      flex: 0 0 auto;
      padding: 7px 10px;
    }

    #clearBtn:hover:not(:disabled) { background: #4a4f5b; }

    #status {
      min-height: 36px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }

    #status.success {
      display: block;
      background: #1e3a2f;
      border: 1px solid #2d6a4f;
      color: #52b788;
    }

    #status.error {
      display: block;
      background: #3b1a1a;
      border: 1px solid #6b2c2c;
      color: #e07070;
    }

    #status.info {
      display: block;
      background: #1e2a3a;
      border: 1px solid #2d4a6a;
      color: #7ab3e0;
    }

    .cache-info {
      font-size: 11px;
      color: #6e7580;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🏷 Slack Emojis for Meet</h1>
  <p class="subtitle">Bring your workspace emojis into Google Meet chat.</p>

  <label for="tokenInput">Slack API token</label>
  <input type="password" id="tokenInput" placeholder="xoxp-… or xoxb-…" autocomplete="off" />

  <p class="help">
    Get a token from
    <a href="https://api.slack.com/apps" target="_blank">api.slack.com/apps</a>
    → OAuth &amp; Permissions → User Token Scopes → add
    <code>emoji:read</code> → Install to workspace → copy the OAuth token.
  </p>

  <div class="actions">
    <button id="syncBtn">Sync emojis</button>
    <button id="clearBtn" title="Clear saved token and cache">Clear</button>
  </div>

  <div id="status"></div>
  <p class="cache-info" id="cacheInfo"></p>

  <script src="popup.js"></script>
</body>
</html>
